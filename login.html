<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Login — Adhyayan Classes</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#f6f4ef"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Adhyayan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    /* ── Login Page Styles ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 1.5rem 1rem;
    }

    /* Background orbs */
    .login-bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .login-orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: .12;
    }
    .login-orb-1 { width: 500px; height: 500px; background: var(--accent); top: -120px; right: -100px; }
    .login-orb-2 { width: 350px; height: 350px; background: var(--blue); bottom: -80px; left: -60px; }
    .login-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(to right,var(--border) 1px,transparent 1px),
                        linear-gradient(to bottom,var(--border) 1px,transparent 1px);
      background-size: 46px 46px; opacity: .22;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
    }

    /* Card */
    #loginCard {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow-lg);
      padding: 2rem 1.75rem 2rem;
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* Logo */
    #loginLogo {
      display: flex; flex-direction: column; align-items: center;
      gap: .45rem; margin-bottom: 1.8rem; text-align: center;
    }
    .login-logo-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 1.8rem; font-style: italic;
      box-shadow: 0 6px 24px rgba(232,97,26,.35);
    }
    .login-app-name {
      font-size: 1.15rem; font-weight: 800; color: var(--text); letter-spacing: -.02em;
    }
    .login-app-sub {
      font-size: .72rem; color: var(--text3); font-weight: 500; margin-top: .05rem;
    }

    /* Tabs */
    #loginTabs {
      display: flex; gap: .3rem;
      background: var(--surface2); border-radius: 10px; padding: 3px;
      margin-bottom: 1.5rem;
    }
    .ltab {
      flex: 1; padding: .5rem; border: none; border-radius: 8px;
      font-family: var(--font); font-size: .82rem; font-weight: 600;
      color: var(--text3); background: transparent; transition: all .2s; cursor: pointer;
    }
    .ltab.active {
      background: var(--surface); color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    /* Form fields */
    .login-field {
      display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem;
    }
    .login-label {
      font-size: .78rem; font-weight: 600; color: var(--text2);
    }
    .login-input {
      width: 100%; padding: .72rem .95rem;
      border: 1.5px solid var(--border); border-radius: 11px;
      background: var(--surface2); color: var(--text);
      font-family: var(--font); font-size: .9rem;
      transition: border-color .2s, background .2s;
      outline: none; -webkit-appearance: none;
    }
    .login-input:focus {
      border-color: var(--accent); background: var(--surface);
      box-shadow: 0 0 0 3px rgba(232,97,26,.1);
    }
    .login-input::placeholder { color: var(--text3) }

    /* Password wrapper */
    .pw-wrap { position: relative }
    .pw-wrap .login-input { padding-right: 2.8rem }
    #togglePw, #togglePwR {
      position: absolute; right: .8rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text3); padding: .1rem;
      transition: color .2s;
    }
    #togglePw:hover, #togglePwR:hover { color: var(--accent) }

    /* Name field (signup only) */
    #nameField { display: none }

    /* Submit button */
    #loginBtn {
      width: 100%; padding: .78rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 11px;
      font-family: var(--font); font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 18px rgba(232,97,26,.3);
      margin-top: .5rem; display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    #loginBtn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(232,97,26,.4) }
    #loginBtn:active { transform: translateY(0) }
    #loginBtn:disabled { opacity: .6; cursor: not-allowed; transform: none }

    /* Spinner inside button */
    .btn-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    /* Error / success message */
    #loginMsg {
      font-size: .78rem; font-weight: 600; text-align: center;
      padding: .55rem .9rem; border-radius: 9px;
      margin-top: .85rem; display: none;
    }
    #loginMsg.error   { background: #fdecea; color: #c62828; display: block }
    #loginMsg.success { background: var(--green-soft); color: var(--green); display: block }

    /* Forgot password link */
    #forgotLink {
      display: block; text-align: right;
      font-size: .73rem; font-weight: 600;
      color: var(--accent); margin-top: -.4rem; margin-bottom: .9rem;
      cursor: pointer; background: none; border: none;
      font-family: var(--font);
    }
    #forgotLink:hover { text-decoration: underline }

    /* Footer */
    .login-footer {
      text-align: center; margin-top: 1.4rem;
      font-size: .7rem; color: var(--text3);
    }
    .login-footer a { color: var(--accent); font-weight: 600 }
  </style>
</head>
<body>

<!-- Background -->
<div class="login-bg">
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-grid"></div>
</div>

<!-- Login Card -->
<div id="loginCard">

  <!-- Logo -->
  <div id="loginLogo">
    <div class="login-logo-mark">अ</div>
    <div>
      <div class="login-app-name">Adhyayan Classes</div>
      <div class="login-app-sub">Class 11 &amp; 12 · Study Platform</div>
    </div>
  </div>

  <!-- Tabs: Login / Sign Up -->
  <div id="loginTabs">
    <button class="ltab active" id="tabLogin" onclick="switchTab('login')">लॉगिन</button>
    <button class="ltab"        id="tabSignup" onclick="switchTab('signup')">नया अकाउंट</button>
  </div>

  <!-- Name (signup only) -->
  <div class="login-field" id="nameField">
    <label class="login-label" for="nameInput">नाम</label>
    <input class="login-input" id="nameInput" type="text" placeholder="आपका नाम" autocomplete="name"/>
  </div>

  <!-- Email -->
  <div class="login-field">
    <label class="login-label" for="emailInput">ईमेल</label>
    <input class="login-input" id="emailInput" type="email" placeholder="email@example.com" autocomplete="email"/>
  </div>

  <!-- Password -->
  <div class="login-field">
    <label class="login-label" for="pwInput">पासवर्ड</label>
    <div class="pw-wrap">
      <input class="login-input" id="pwInput" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <button id="togglePw" type="button" onclick="togglePwVis('pwInput','togglePw')" title="Show/Hide">👁</button>
    </div>
  </div>

  <!-- Forgot password (login tab only) -->
  <button id="forgotLink" onclick="forgotPassword()">पासवर्ड भूल गए?</button>

  <!-- Confirm password (signup only) -->
  <div class="login-field" id="confirmField" style="display:none">
    <label class="login-label" for="pwRepeat">पासवर्ड दोबारा</label>
    <div class="pw-wrap">
      <input class="login-input" id="pwRepeat" type="password" placeholder="••••••••" autocomplete="new-password"/>
      <button id="togglePwR" type="button" onclick="togglePwVis('pwRepeat','togglePwR')" title="Show/Hide">👁</button>
    </div>
  </div>

  <!-- Submit -->
  <button id="loginBtn" onclick="handleSubmit()">
    <span class="btn-spinner" id="btnSpinner"></span>
    <span id="btnLabel">लॉगिन करें</span>
  </button>

  <!-- Message -->
  <div id="loginMsg"></div>

  <!-- Footer -->
  <div class="login-footer">
    Adhyayan Classes · Begusarai, Bihar<br/>
    <a href="tel:6205034322">6205034322</a>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { auth } from "./firebase.js";
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail,
    onAuthStateChanged,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── Already logged in? Redirect immediately ──
  onAuthStateChanged(auth, user => {
    if (user) location.href = "index.html";
  });

  // ── Tab switch ──
  window.switchTab = (tab) => {
    const isSignup = tab === 'signup';
    document.getElementById('tabLogin').classList.toggle('active', !isSignup);
    document.getElementById('tabSignup').classList.toggle('active', isSignup);
    document.getElementById('nameField').style.display    = isSignup ? 'flex' : 'none';
    document.getElementById('confirmField').style.display = isSignup ? 'flex' : 'none';
    document.getElementById('forgotLink').style.display   = isSignup ? 'none' : 'block';
    document.getElementById('btnLabel').textContent = isSignup ? 'अकाउंट बनाएं' : 'लॉगिन करें';
    clearMsg();
    window._loginTab = tab;
  };
  window._loginTab = 'login';

  // ── Toggle password visibility ──
  window.togglePwVis = (inputId, btnId) => {
    const inp = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈' }
    else { inp.type = 'password'; btn.textContent = '👁' }
  };

  // ── Helpers ──
  const setLoading = (on) => {
    const btn = document.getElementById('loginBtn');
    const sp  = document.getElementById('btnSpinner');
    btn.disabled = on;
    sp.style.display = on ? 'block' : 'none';
  };
  const showMsg = (txt, type) => {
    const el = document.getElementById('loginMsg');
    el.textContent = txt;
    el.className = type; // 'error' or 'success'
  };
  const clearMsg = () => {
    const el = document.getElementById('loginMsg');
    el.className = '';
    el.textContent = '';
  };

  // ── Submit (login / signup) ──
  window.handleSubmit = async () => {
    const email = document.getElementById('emailInput').value.trim();
    const pw    = document.getElementById('pwInput').value;
    const tab   = window._loginTab;

    if (!email || !pw) { showMsg('ईमेल और पासवर्ड भरें।', 'error'); return; }

    if (tab === 'signup') {
      const name = document.getElementById('nameInput').value.trim();
      const pw2  = document.getElementById('pwRepeat').value;
      if (!name)    { showMsg('नाम भरें।', 'error'); return; }
      if (pw !== pw2) { showMsg('दोनों पासवर्ड एक जैसे नहीं हैं।', 'error'); return; }
      if (pw.length < 6) { showMsg('पासवर्ड कम से कम 6 अक्षर का होना चाहिए।', 'error'); return; }
      setLoading(true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(cred.user, { displayName: name });
        showMsg('अकाउंट बन गया! लॉगिन हो रहे हैं…', 'success');
        setTimeout(() => location.href = 'index.html', 800);
      } catch(e) {
        setLoading(false);
        showMsg(firebaseError(e.code), 'error');
      }
    } else {
      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, pw);
        showMsg('लॉगिन हो रहे हैं…', 'success');
        setTimeout(() => location.href = 'index.html', 600);
      } catch(e) {
        setLoading(false);
        showMsg(firebaseError(e.code), 'error');
      }
    }
  };

  // ── Forgot password ──
  window.forgotPassword = async () => {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { showMsg('पहले ईमेल भरें, फिर "पासवर्ड भूल गए?" दबाएं।', 'error'); return; }
    setLoading(true);
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('पासवर्ड रीसेट ईमेल भेज दिया गया!', 'success');
    } catch(e) {
      showMsg(firebaseError(e.code), 'error');
    } finally { setLoading(false); }
  };

  // ── Enter key support ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleSubmit();
  });

  // ── Firebase error messages in Hindi ──
  function firebaseError(code) {
    const map = {
      'auth/user-not-found':      'यह ईमेल रजिस्टर नहीं है।',
      'auth/wrong-password':      'पासवर्ड गलत है।',
      'auth/invalid-credential':  'ईमेल या पासवर्ड गलत है।',
      'auth/email-already-in-use':'यह ईमेल पहले से रजिस्टर है।',
      'auth/invalid-email':       'ईमेल सही नहीं है।',
      'auth/too-many-requests':   'बहुत ज़्यादा कोशिश हुई। थोड़ी देर बाद try करें।',
      'auth/network-request-failed': 'इंटरनेट कनेक्शन चेक करें।',
      'auth/weak-password':       'पासवर्ड कम से कम 6 अक्षर का होना चाहिए।',
      'auth/popup-blocked':       'Popup block हो गया। Browser settings चेक करें।',
    };
    return map[code] || `Error: ${code}`;
  }
</script>

<!-- Dark mode sync -->
<script>
  const saved = localStorage.getItem('adhyayan-theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
</script>

</body>
</html>
